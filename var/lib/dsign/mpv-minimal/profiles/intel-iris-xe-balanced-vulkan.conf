# ============================================================
# Intel — как прежний «balanced» с Vulkan VO (экспериментально)
# ============================================================
# DSIGN_MPV_PROFILE=intel-balanced-vulkan
#
# На многих установках на tty даёт только звук без картинки — тогда не используйте.

vo=gpu
gpu-context=drm
gpu-api=vulkan

hwdec=vaapi

interpolation=no
video-sync=display-resample

video-latency-hacks=no
vd-lavc-threads=2

scale=spline36
cscale=spline36
dscale=mitchell

deband=yes
deband-threshold=16
