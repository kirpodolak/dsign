# Intel Iris Xe — Wayland/labwc (vo/gpu-context set by dsign-mpv-launch-wayland)
# DSIGN_MPV_PROFILE=intel-balanced-wayland
#
# Do NOT set vo=drm here. Avoid vaapi-copy on Wayland (CPU memcpy per frame).
# video-sync=audio: Rutube/HLS is mostly 29.97fps on 60Hz displays; display-vdrop
# causes visible micro-stutter on labwc (vsync-ratio ~2.0, vo-delayed frames).

hwdec=vaapi

interpolation=no
video-sync=audio

video-latency-hacks=no
vd-lavc-threads=2

scale=bilinear
cscale=bilinear
dscale=bilinear

deband=no
