# Intel Iris Xe — Wayland/labwc (vo/gpu-context set by dsign-mpv-launch-wayland)
# DSIGN_MPV_PROFILE=intel-balanced-wayland
#
# Do NOT set vo=drm here. Avoid vaapi-copy on Wayland (CPU memcpy per frame).
# video-sync=display-resample: 29.97fps HLS on 60Hz — smooth pacing without slow-mo.
# display-vdrop caused micro-stutter on labwc; audio sync caused slow-motion on Rutube/HLS.

hwdec=vaapi

interpolation=no
video-sync=display-resample

video-latency-hacks=no
vd-lavc-threads=2

scale=bilinear
cscale=bilinear
dscale=bilinear

deband=no
