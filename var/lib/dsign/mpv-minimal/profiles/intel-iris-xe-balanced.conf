# ============================================================
# Intel Iris Xe — баланс качество / нагрузка (консоль DRM/KMS)
# ============================================================
# DSIGN_MPV_PROFILE=intel-balanced
#
# vo=gpu + Vulkan на чистой tty часто даёт чёрный экран при рабочем звуке.
# Здесь: vo=drm (стабильная картинка на вывеске) + hwdec=vaapi (Quick Sync).

vo=drm
hwdec=vaapi

interpolation=yes
video-sync=display-vdrop
tscale=oversample

video-latency-hacks=no
vd-lavc-threads=2

scale=mitchell
cscale=bilinear
dscale=mitchell

deband=yes
deband-threshold=16
