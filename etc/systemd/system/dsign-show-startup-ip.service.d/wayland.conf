# Wayland: startup IP OSD after compositor + mpv-wayland (not DRM dsign-mpv).

[Unit]
After=
After=dsign-compositor.service dsign-mpv-wayland.service dsign-network-assistant.service

[Service]
EnvironmentFile=-/var/lib/dsign/config/wayland.env
Environment=DSIGN_DISPLAY_BACKEND=wayland
Environment=WAYLAND_DISPLAY=wayland-0
Environment=XDG_RUNTIME_DIR=/run/user/1000
