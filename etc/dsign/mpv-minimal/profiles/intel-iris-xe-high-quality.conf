# ============================================================
# High quality / Intel Iris Xe (Vulkan + VA-API), DRM/KMS console
# ============================================================
# Requires: Mesa Intel Vulkan driver, VA-API (intel-media-driver / i965).
# Включение: Environment=DSIGN_MPV_PROFILE=intel-high-quality в юните dsign-mpv.service
# (см. usr/local/bin/dsign-mpv-launch).

# Video output: GPU VO + DRM KMS (no X11/Wayland)
vo=gpu
gpu-context=drm
gpu-api=vulkan

# Hardware decode (Intel Quick Sync via VA-API)
hwdec=vaapi

profile=high-quality

video-sync=display-resample
interpolation
tscale=oversample

video-latency-hacks=no
vd-lavc-threads=4

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell

deband=yes
deband-threshold=30
