# ============================================================
# Intel Iris Xe — баланс качество / нагрузка (DRM/KMS, без X11)
# ============================================================
# Включается через systemd: Environment=DSIGN_MPV_PROFILE=intel-balanced
# (см. usr/local/bin/dsign-mpv-launch — не нужно править mpv.conf).

vo=gpu
gpu-context=drm
gpu-api=vulkan

hwdec=vaapi

# Без profile=high-quality и без интерполяции кадров — меньше нагрузка на GPU.
interpolation=no
video-sync=display-resample

video-latency-hacks=no
vd-lavc-threads=2

scale=spline36
cscale=spline36
dscale=mitchell

deband=yes
deband-threshold=16
