# Intel Iris Xe — Wayland/labwc (vo/gpu-context set by dsign-mpv-launch-wayland)
# DSIGN_MPV_PROFILE=intel-balanced-wayland
#
# Do NOT set vo=drm here. Avoid vaapi-copy on Wayland (CPU memcpy per frame).

hwdec=vaapi

interpolation=no
video-sync=display-vdrop

video-latency-hacks=no
vd-lavc-threads=2

scale=bilinear
cscale=bilinear
dscale=bilinear

deband=no
