# Digital Signage MPV config (--config-dir=/var/lib/dsign/mpv-minimal).
# Installed to /var/lib/dsign/mpv-minimal/mpv.conf by install_dsign.sh (first run only).

script-opts=ytdl_hook-ytdl_path=/usr/bin/yt-dlp

# Web UI preview: allow composited screenshots when VO uses DRM/GPU paths that skip /dev/fb0.
screenshot-sw=yes
screenshot-directory=/home/dsign/dsign/static/images
screenshot-format=jpeg
screenshot-template=preview-ipc-%04n

# A1: preload next item in mpv internal playlists (local video zero-gap).
prefetch-playlist=yes

# --- Профили Intel / качество (без правки этого файла) ---
# В systemd для dsign-mpv.service задайте переменную:
#   DSIGN_MPV_PROFILE=signboard           — вывеска по умолчанию (vo=drm, лёгкое масштабирование)
#   DSIGN_MPV_PROFILE=intel-balanced         — Intel x86: vo=drm + VA-API (картинка на tty)
#   DSIGN_MPV_PROFILE=intel-balanced-vulkan — vo=gpu Vulkan (часто чёрный экран на tty — только звук)
#   DSIGN_MPV_PROFILE=intel-high-quality     — максимум качества (тяжелее для GPU)
# Опционально для signboard на Raspberry Pi:
#   DSIGN_MPV_SIGNBOARD_VARIANT=pi
# См. usr/local/bin/dsign-mpv-launch и etc/systemd/system/dsign-mpv.service.d/*.example
