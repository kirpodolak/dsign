# Minimal MPV config for dsign-mpv.service (--config-dir=/var/lib/dsign/mpv-minimal).
# yt-dlp must be on PATH for the dsign user, or add:
#   script-opts=ytdl_hook-ytdl_path=/full/path/to/yt-dlp
script-opts=ytdl_hook-ytdl_path=/usr/bin/yt-dlp

# With vo=drm the Linux framebuffer (/dev/fb0) often does not mirror video — preview capture would be black.
# Allow CPU compositing so screenshot-to-file / screenshot-sw can produce a real frame for the web UI.
screenshot-sw=yes

# Builtin IPC command `screenshot` writes here (see usr/local/bin/dsign-capture fallback when screenshot-to-file fails).
screenshot-directory=/home/dsign/dsign/static/images
screenshot-format=jpeg
screenshot-template=preview-ipc-%04n
