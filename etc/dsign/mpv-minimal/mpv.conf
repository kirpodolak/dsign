# Digital Signage MPV config (--config-dir=/var/lib/dsign/mpv-minimal).
# Installed to /var/lib/dsign/mpv-minimal/mpv.conf by install_dsign.sh (first run only).

script-opts=ytdl_hook-ytdl_path=/usr/bin/yt-dlp

# Web UI preview: allow composited screenshots when VO uses DRM/GPU paths that skip /dev/fb0.
screenshot-sw=yes
screenshot-directory=/home/dsign/dsign/static/images
screenshot-format=jpeg
screenshot-template=preview-ipc-%04n

# --- Optional: Intel Iris Xe (VKMS/DRM console, x86) — high quality playback ---
# 1) Append this line (paths relative to this config dir):
#    include=profiles/intel-iris-xe-high-quality.conf
# 2) Override systemd ExecStart so CLI does not force --vo=drm and light scaling.
#    Copy etc/systemd/system/dsign-mpv.service.d/intel-iris-xe.conf.example to:
#    /etc/systemd/system/dsign-mpv.service.d/intel-iris-xe.conf
#    then: sudo systemctl daemon-reload && sudo systemctl restart dsign-mpv.service
