{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/gallery.css') }}">
{% endblock %}

{% block content %}
<h1>Media Gallery</h1>

<div class="controls">
  <div class="search-sort">
    <input type="text" id="search-input" placeholder="Search files...">
    <select id="sort-select">
      <option value="name-asc">Name (A-Z)</option>
      <option value="name-desc">Name (Z-A)</option>
      <option value="date-newest">Date (Newest)</option>
      <option value="date-oldest">Date (Oldest)</option>
      <option value="type">File Type</option>
    </select>
    <select id="group-select">
      <option value="none">No Grouping</option>
      <option value="type">Group by Type</option>
      <option value="date">Group by Date</option>
    </select>
  </div>
</div>

<div class="file-grid" id="media-gallery">
  <!-- Media files will be rendered here -->
</div>

<div class="actions">
  <button id="select-all" class="btn secondary">
    <i class="fas fa-check-square"></i> Select All
  </button>
  <button id="delete-selected" class="btn danger">
    <i class="fas fa-trash"></i> Delete Selected
  </button>
</div>

<form id="upload-form" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="upload-container">
    <input type="file" id="file-upload" multiple accept=".jpg,.jpeg,.png,.gif,.mp4,.webm,.avi">
    <button type="button" id="upload-btn" class="btn primary upload-btn" aria-live="polite">
      <span class="upload-btn__track" aria-hidden="true"><span class="upload-btn__fill"></span></span>
      <span class="upload-btn__content">
        <i class="fas fa-upload upload-btn__icon" aria-hidden="true"></i>
        <span class="upload-btn__text">Upload</span>
      </span>
    </button>
  </div>
</form>

<!-- Preview: fixed overlay + centered dialog (styles in gallery.css) -->
<div id="preview-modal" class="preview-modal" role="dialog" aria-modal="true" aria-labelledby="preview-filename" hidden>
  <div class="preview-modal__panel">
    <button type="button" class="preview-modal__close" id="preview-modal-close" aria-label="Close preview">
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
    <div id="preview-container" class="preview-modal__media"></div>
    <div class="preview-modal__meta">
      <h3 id="preview-filename"></h3>
      <p id="preview-filesize"></p>
      <p id="preview-date"></p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/gallery.js') }}"></script>
{% endblock %}
