<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Digital Signage{% endblock %}</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block styles %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div id="startup-ip-badge" class="startup-ip-badge" hidden>
        <span class="startup-ip-label">Device IP:</span>
        <span id="startup-ip-value" class="startup-ip-value"></span>
    </div>

    <div id="startup-network-overlay" class="startup-network-overlay" hidden>
        <div class="startup-network-modal" role="dialog" aria-modal="true" aria-labelledby="startup-network-title">
            <h2 id="startup-network-title">Network connection required</h2>
            <p class="startup-network-subtitle">
                Internet is unavailable. Select a Wi-Fi network to connect.
            </p>
            <p id="startup-network-status" class="startup-network-status"></p>

            <label for="startup-network-ssid">Available Wi-Fi</label>
            <select id="startup-network-ssid"></select>

            <label class="startup-network-hidden-toggle">
                <input id="startup-network-hidden-toggle" type="checkbox">
                <span>Connect to hidden network</span>
            </label>

            <div id="startup-network-manual-wrap" hidden>
                <label for="startup-network-manual-ssid">Hidden Wi-Fi name (SSID)</label>
                <input id="startup-network-manual-ssid" type="text" autocomplete="off">
            </div>

            <label for="startup-network-password">Wi-Fi password</label>
            <input id="startup-network-password" type="password" autocomplete="off">

            <div class="startup-network-actions">
                <button id="startup-network-scan" type="button" class="btn outline">Scan</button>
                <button id="startup-network-retry" type="button" class="btn outline">Retry internet check</button>
                <button id="startup-network-connect" type="button" class="btn primary">Connect</button>
                <button id="startup-network-close" type="button" class="btn secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Page loader -->
    <div id="page-loader">
        <div class="loader-content">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Loading...</span>
        </div>
    </div>

    {% block site_nav %}
    <nav>
        <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="{{ url_for('main.gallery') }}" class="{% if request.endpoint == 'main.gallery' %}active{% endif %}">
            <i class="fas fa-images"></i> Gallery
        </a>
        <a href="{{ url_for('main.settings') }}" class="{% if request.endpoint == 'main.settings' %}active{% endif %}">
            <i class="fas fa-cog"></i> Settings
        </a>
        <a href="{{ url_for('auth.logout') }}">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </nav>
    {% endblock %}

    <!-- Main content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Notification container -->
    <div id="notification-container"></div>

    <!-- External dependencies -->
    <!-- Socket.IO client is loaded lazily from local static module in base.js. -->
    <script async src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main app initialization -->
    <script type="module" src="{{ url_for('static', filename='js/base.js') }}"></script>

    <!-- Safety: never leave loader stuck visible -->
    <script>
        (function () {
            function hide() {
                const el = document.getElementById('page-loader');
                if (el) el.style.display = 'none';
            }
            document.addEventListener('DOMContentLoaded', hide);
            window.addEventListener('load', hide);
            setTimeout(hide, 8000);
        })();
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
