<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">

    <title>{% block title %}Digital Signage{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ timestamp }}">
    {% block styles %}{% endblock %}
  </head>

  <body class="{% block body_class %}{% endblock %}">
    {% block site_nav %}
    <nav class="site-nav" aria-label="Primary">
      <a class="site-nav__brand" href="{{ url_for('main.index') }}">Digital Signage</a>
      <div class="site-nav__links">
        <a class="site-nav__link" href="{{ url_for('main.index') }}">Home</a>
        <a class="site-nav__link" href="{{ url_for('main.gallery') }}">Gallery</a>
        <a class="site-nav__link" href="{{ url_for('main.settings') }}">Settings</a>
      </div>
    </nav>
    {% endblock %}

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

    <div id="loading-indicator" class="loading-indicator" hidden></div>

    <script type="module" src="{{ url_for('static', filename='js/base.js') }}?v={{ timestamp }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
