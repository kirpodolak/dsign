# DSign deploy manifest — repo paths → system paths.
# Consumed by dsign-verify-install / dsign-apply-install.
# See docs/dsign_4phase_checklist.md (D0).

version: 1

# Resolved as DSIGN_PROJECT_ROOT or /home/dsign/dsign
project_root: /home/dsign/dsign

post_global:
  - strip_crlf_bins
  - daemon-reload

entries:
  # --- /usr/local/bin (mode: always, executable) ---
  - { src: usr/local/bin/dsign-mpv-launch, dest: /usr/local/bin/dsign-mpv-launch, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-mpv-launch-wayland, dest: /usr/local/bin/dsign-mpv-launch-wayland, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-mpv-recover, dest: /usr/local/bin/dsign-mpv-recover, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-mpv-archive-log, dest: /usr/local/bin/dsign-mpv-archive-log, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-mpv-post-start, dest: /usr/local/bin/dsign-mpv-post-start, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-mpv-pre-display, dest: /usr/local/bin/dsign-mpv-pre-display, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-logo-launch, dest: /usr/local/bin/dsign-logo-launch, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-labwc-autostart, dest: /usr/local/bin/dsign-labwc-autostart, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-network-assistant, dest: /usr/local/bin/dsign-network-assistant, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-show-startup-ip, dest: /usr/local/bin/dsign-show-startup-ip, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-wifi-on-display, dest: /usr/local/bin/dsign-wifi-on-display, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-nmtui-tty, dest: /usr/local/bin/dsign-nmtui-tty, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-nmtui-wayland, dest: /usr/local/bin/dsign-nmtui-wayland, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-capture, dest: /usr/local/bin/dsign-capture, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-preview-timer, dest: /usr/local/bin/dsign-preview-timer, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-fix-sudoers, dest: /usr/local/bin/dsign-fix-sudoers, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-fix-deploy-scripts, dest: /usr/local/bin/dsign-fix-deploy-scripts, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-disable-drm-mpv, dest: /usr/local/bin/dsign-disable-drm-mpv, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-display-apply, dest: /usr/local/bin/dsign-display-apply, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-diagnose-playback, dest: /usr/local/bin/dsign-diagnose-playback, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-diagnose-audio, dest: /usr/local/bin/dsign-diagnose-audio, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-diagnose-compositor, dest: /usr/local/bin/dsign-diagnose-compositor, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-sync-wayland-drm, dest: /usr/local/bin/dsign-sync-wayland-drm, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-diagnose-wifi-on-display, dest: /usr/local/bin/dsign-diagnose-wifi-on-display, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-deploy-manifest.py, dest: /usr/local/bin/dsign-deploy-manifest.py, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-verify-install, dest: /usr/local/bin/dsign-verify-install, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-apply-install, dest: /usr/local/bin/dsign-apply-install, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-api-token, dest: /usr/local/bin/dsign-api-token, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-update, dest: /usr/local/bin/dsign-update, mode: always, perm: "0755", strip_crlf: true }
  - { src: usr/local/bin/dsign-ota-bootstrap, dest: /usr/local/bin/dsign-ota-bootstrap, mode: always, perm: "0755", strip_crlf: true }

  # --- systemd units (canonical from etc/, not install_dsign.sh heredoc) ---
  - { src: etc/systemd/system/digital-signage.service, dest: /etc/systemd/system/digital-signage.service, mode: always, perm: "0644", post: [patch-digital-signage-unit] }
  - { src: etc/systemd/system/dsign-mpv.service, dest: /etc/systemd/system/dsign-mpv.service, mode: always, perm: "0644", note: "replaces install_dsign.sh heredoc" }
  - { src: etc/systemd/system/dsign-mpv-wayland.service, dest: /etc/systemd/system/dsign-mpv-wayland.service, mode: always, perm: "0644" }
  - { src: etc/systemd/system/dsign-compositor.service, dest: /etc/systemd/system/dsign-compositor.service, mode: always, perm: "0644" }
  - { src: etc/systemd/system/dsign-logo.service, dest: /etc/systemd/system/dsign-logo.service, mode: always, perm: "0644" }
  - { src: etc/systemd/system/dsign-network-assistant.service, dest: /etc/systemd/system/dsign-network-assistant.service, mode: always, perm: "0644", note: "replaces install_dsign.sh heredoc" }
  - { src: etc/systemd/system/dsign-show-startup-ip.service, dest: /etc/systemd/system/dsign-show-startup-ip.service, mode: always, perm: "0644", note: "replaces install_dsign.sh heredoc" }
  - { src: etc/systemd/system/screenshot.service, dest: /etc/systemd/system/screenshot.service, mode: always, perm: "0644" }
  - { src: etc/systemd/system/screenshot.timer, dest: /etc/systemd/system/screenshot.timer, mode: always, perm: "0644" }
  - { src: etc/systemd/system/dsign-update.service, dest: /etc/systemd/system/dsign-update.service, mode: always, perm: "0644" }
  - { src: etc/systemd/system/dsign-update.timer, dest: /etc/systemd/system/dsign-update.timer, mode: always, perm: "0644" }
  - { src: etc/systemd/system/digital-signage.service.d/wayland.conf, dest: /etc/systemd/system/digital-signage.service.d/wayland.conf, mode: always, perm: "0644", group: wayland }
  - { src: etc/systemd/system/screenshot.service.d/wayland.conf, dest: /etc/systemd/system/screenshot.service.d/wayland.conf, mode: always, perm: "0644", group: wayland }
  - { src: etc/systemd/system/dsign-show-startup-ip.service.d/wayland.conf, dest: /etc/systemd/system/dsign-show-startup-ip.service.d/wayland.conf, mode: always, perm: "0644", group: wayland }

  # --- sudoers ---
  - { src: etc/sudoers.d/dsign-screenshot, dest: /etc/sudoers.d/dsign-screenshot, mode: always, perm: "0440", strip_crlf: true, post: [visudo] }
  - { src: etc/sudoers.d/dsign-systemctl, dest: /etc/sudoers.d/dsign-systemctl, mode: always, perm: "0440", strip_crlf: true, post: [visudo] }
  - { src: etc/sudoers.d/dsign-mpv-restart, dest: /etc/sudoers.d/dsign-mpv-restart, mode: always, perm: "0440", strip_crlf: true, post: [visudo] }
  - { src: etc/sudoers.d/dsign-preview-timer, dest: /etc/sudoers.d/dsign-preview-timer, mode: always, perm: "0440", strip_crlf: true, post: [visudo] }

  # --- tmpfiles ---
  - { src: etc/tmpfiles.d/dsign.conf, dest: /etc/tmpfiles.d/dsign.conf, mode: always, perm: "0644", post: [tmpfiles] }

  # --- /var/lib/dsign runtime config (from etc/dsign/) ---
  - { src: etc/dsign/mpv-minimal/mpv.conf, dest: /var/lib/dsign/mpv-minimal/mpv.conf, mode: if-missing, perm: "0644", owner: dsign:video }
  - { src: etc/dsign/mpv-minimal/profiles/intel-iris-xe-high-quality.conf, dest: /var/lib/dsign/mpv-minimal/profiles/intel-iris-xe-high-quality.conf, mode: if-missing, perm: "0644", owner: dsign:video }
  - { src: etc/dsign/mpv-minimal/profiles/intel-iris-xe-balanced.conf, dest: /var/lib/dsign/mpv-minimal/profiles/intel-iris-xe-balanced.conf, mode: if-missing, perm: "0644", owner: dsign:video }
  - { src: etc/dsign/mpv-minimal/profiles/intel-iris-xe-balanced-vulkan.conf, dest: /var/lib/dsign/mpv-minimal/profiles/intel-iris-xe-balanced-vulkan.conf, mode: if-missing, perm: "0644", owner: dsign:video }
  - { src: etc/dsign/mpv-minimal/profiles/intel-iris-xe-balanced-wayland.conf, dest: /var/lib/dsign/mpv-minimal/profiles/intel-iris-xe-balanced-wayland.conf, mode: always, perm: "0644", owner: dsign:video }
  - { src: etc/dsign/labwc/rc.xml, dest: /var/lib/dsign/labwc/rc.xml, mode: always, perm: "0644", owner: dsign:dsign }
  - { src: etc/dsign/labwc/autostart, dest: /var/lib/dsign/labwc/autostart, mode: always, perm: "0755", owner: dsign:dsign, strip_crlf: true }
  - { src: etc/dsign/wayland.env.example, dest: /var/lib/dsign/config/wayland.env, mode: if-missing, perm: "0644", owner: dsign:dsign, post: [patch-wayland-env] }

# Files generated only by install_dsign.sh (not in repo as static paths) — verify reports separately:
# - /etc/nginx/sites-available/dsign
# - /etc/udev/rules.d/99-dsign.rules
# - /home/dsign/config/config.py
